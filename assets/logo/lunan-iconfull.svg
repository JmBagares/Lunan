  <path d="M256 112
           C 194.08 112, 144 162.08, 144 224
           C 144 308, 256 432, 256 432
           C 256 432, 368 308, 368 224
           C 368 162.08, 317.92 112, 256 112 Z"
        fill="url(#coral)"/>
  <circle cx="252" cy="222" r="64" fill="#FFF9F5"/>
  <circle cx="292" cy="196" r="56" fill="url(#coral)"/>
</svg>
