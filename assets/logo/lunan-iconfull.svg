<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF9F5"/>
      <stop offset="1" stop-color="#FFE7DF"/>
    </linearGradient>
    <linearGradient id="coral" gradientUnits="userSpaceOnUse" x1="256" y1="112" x2="256" y2="432">
      <stop offset="0" stop-color="#FF8273"/>
      <stop offset="1" stop-color="#F0543D"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (the launcher rounds the corners itself) -->
